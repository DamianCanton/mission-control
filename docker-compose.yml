version: '3.8'

services:
  mission-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mission-backend
    ports:
      - "3000:3000"
    restart: always
    volumes:
      - /tmp/openclaw:/tmp/openclaw:ro
    environment:
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
    networks:
      - mission-network

  mission-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY:-}
    container_name: mission-frontend
    ports:
      - "3001:80"
    restart: always
    depends_on:
      - mission-backend
    networks:
      - mission-network

networks:
  mission-network:
    driver: bridge